<script>
fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data => {

    const country = data.country;

    let pages = [];

    // 🇺🇸 高价值国家
    if (country === "US" || country === "CA" || country === "GB") {
        pages = ["story1.html","story2.html","story3.html"];
    } 
    // 🇪🇺 欧洲
    else if (country === "DE" || country === "FR") {
        pages = ["story4.html","story5.html","story6.html"];
    } 
    // 🌏 其他
    else {
        pages = ["story7.html","story8.html","story9.html"];
    }

    // 随机选一个页面
    const targetPage = pages[Math.floor(Math.random() * pages.length)];

    setTimeout(() => {
        window.location.href = targetPage;
    }, 6000);

});
</script>

</head>
